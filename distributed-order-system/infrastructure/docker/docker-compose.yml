version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - '29092:29092'
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1

  postgres-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '5432:5432'

  mongo-read:
    image: mongo:7
    ports:
      - '27017:27017'

  api-gateway:
    build: { context: ../../, dockerfile: infrastructure/docker/Dockerfile }
    ports:
      - '${GATEWAY_PORT}:4000'
    command: npx tsx apps/api-gateway/src/index.ts

  order-service:
    build: { context: ../../, dockerfile: infrastructure/docker/Dockerfile }
    depends_on: [kafka, postgres-db]
    environment:
      - KAFKA_BROKERS=${KAFKA_BROKERS}
      - DATABASE_URL=${ORDER_DB_URL}
    command: npx tsx apps/order-service/src/index.ts

  # inventory-service:
  #   build: { context: ../../, dockerfile: infrastructure/docker/Dockerfile }
  #   depends_on: [kafka, postgres-db]
  #   environment:
  #     - KAFKA_BROKERS=${KAFKA_BROKERS}
  #     - DATABASE_URL=${INVENTORY_DB_URL}
  #   command: npx tsx apps/inventory-service/src/index.ts

  # payment-service:
  #   build: { context: ../../, dockerfile: infrastructure/docker/Dockerfile }
  #   depends_on: [kafka, postgres-db]
  #   environment:
  #     - KAFKA_BROKERS=${KAFKA_BROKERS}
  #     - DATABASE_URL=${PAYMENT_DB_URL}
  #   command: npx tsx apps/payment-service/src/index.ts

  read-service:
    build: { context: ../../, dockerfile: infrastructure/docker/Dockerfile }
    depends_on: [kafka, mongo-read]
    environment:
      - KAFKA_BROKERS=${KAFKA_BROKERS}
      - MONGO_URI=${MONGO_URI}
    command: npx tsx apps/read-service/src/index.ts
  web-client:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:4000
    # We run the dev command so you can edit code and see changes live
    command: npm run dev --workspace=web-client
