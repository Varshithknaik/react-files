<!DOCTYPE html>
<html>
  <head>
    <style>
      body{
        font-family: -apple-system, sans-serif;
        display: flex;
        justify-content: center;
        padding: 40px;
        background-color: #1a1a2e;
        color: #eee;
      }

      .chat-container{
        width: 600px;
      }
      .input-wrapper{
        display: flex;
        gap: 1rem;
        gap:0.5rem;
        padding: 12px;
        background: #16213e;
        border-radius: 12px;
        align-items: flex-end;
      }

      textarea{
        flex: 1;
        padding: 10px 14px;
        border: 1px solid #333;
        border-radius: 0.5rem;
        background: rgb(27, 26, 26);
        color: #eee;
        font-size: 14px;
        font-family: inherit;
        resize: none;
        outline: none;
        overflow-y: auto;
      }

      textarea:focus{
        border-color: rgb(177, 32, 138);

      }

      button{
        padding: 10px 20px;
        background: rgba(217, 14, 44, 0.819);
        border-radius: 8px;
        border: 0;
        cursor: pointer;
        color: white;
        
      }
    </style>

  </head>
  <body>
    <div class="chat-container">
      <div class="attached-files" id="attached-files">
      </div>
      <div class="input-wrapper">
        <div class="mention-popover" id='popover'>

        </div>
        <textarea id="input" rows="1" placeholder="Type @ to mention a file"></textarea>
        <button onclick="send()">Send</button>
      </div>
    </div>
  </body>
</html>
